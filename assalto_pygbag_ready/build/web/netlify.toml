[build]
  publish = "."

[[redirects]]
  from = "/archives/*"
  to = "https://pygame-web.github.io/archives/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
    Cross-Origin-Resource-Policy = "cross-origin"
