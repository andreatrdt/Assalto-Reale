name: Finalize Game Core Command API

on:
  push:
    branches:
      - refactor/game-core-command-api

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/game-core-command-api
          fetch-depth: 0

      - name: Apply final readable source files
        shell: bash
        run: |
          set -euo pipefail
          cp .github/finalize-command-api/clockController.ts.txt web/src/game/clocks/clockController.ts
          cp .github/finalize-command-api/placementSetup.ts.txt web/src/game/placement/placementSetup.ts
          cp .github/finalize-command-api/storeTypes.ts.txt web/src/game/state/storeTypes.ts
          cp .github/finalize-command-api/turnHelpers.ts.txt web/src/game/turn/turnHelpers.ts
          rm -f web/src/game/turn/commitAction.ts
          rm -rf .github/finalize-command-api
          rm -f .github/workflows/finalize-game-core-command-api.yml

      - name: Commit final source tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No normalization changes were required."
            exit 0
          fi
          git commit -m "refactor: finalize web game-core adapters"
          git push origin HEAD:refactor/game-core-command-api
