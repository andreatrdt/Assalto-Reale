name: Apply transport fixture fix

on:
  push:
    branches:
      - feat/transport-adapter

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, 'fix transport request sync fixture') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/transport-adapter

      - name: Add required RequestSync version marker
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("packages/server-transport/tests/transportServer.test.ts")
          source = path.read_text()
          old = '{ type: "RequestSync" },'
          new = '{ type: "RequestSync", lastSeenMatchVersion: null },'
          if old not in source:
              raise SystemExit("RequestSync fixture target not found")
          path.write_text(source.replace(old, new, 1))
          PY

      - name: Commit fixture fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/server-transport/tests/transportServer.test.ts
          git commit -m "test: fix transport request sync fixture"
          git push origin HEAD:feat/transport-adapter
