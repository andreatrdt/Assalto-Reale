name: Generate transport lockfile

on:
  push:
    branches:
      - feat/transport-adapter

permissions:
  contents: write

jobs:
  lockfile:
    if: ${{ !contains(github.event.head_commit.message, 'lock transport dependencies') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/transport-adapter

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate package lock
        working-directory: packages/server-transport
        run: npm install --package-lock-only --ignore-scripts

      - name: Commit package lock
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/server-transport/package-lock.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: lock transport dependencies"
          git push origin HEAD:feat/transport-adapter
