name: Validate Multiplayer Protocol

on:
  push:
    branches:
      - feat/multiplayer-protocol

permissions:
  contents: write

jobs:
  full-validation:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/multiplayer-protocol
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install pytest

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Python reference tests
        run: python -m pytest -q

      - name: Parity fixture freshness
        working-directory: web
        run: npm run parity:check

      - name: Python-TypeScript parity
        working-directory: web
        run: npm run parity:test

      - name: Web tests with coverage
        working-directory: web
        run: npm run test:coverage

      - name: Typecheck
        working-directory: web
        run: npm run typecheck

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Formatting
        working-directory: web
        run: npm run format:check

      - name: Production audit
        working-directory: web
        run: npm audit --omit=dev

      - name: Production build and package smoke tests
        working-directory: web
        run: npm run build

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Chromium and mobile E2E
        working-directory: web
        run: npm run e2e

      - name: Firefox and WebKit smoke
        working-directory: web
        run: npm run e2e:cross

      - name: Visual gate contract
        working-directory: web
        run: npm run e2e:visual

      - name: Record successful validation and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          : > .github/multiplayer-protocol-green
          rm -f .github/workflows/validate-multiplayer-protocol.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: record multiplayer protocol validation"
          git push origin HEAD:feat/multiplayer-protocol
