name: Format PostgreSQL Adapter

on:
  push:
    branches:
      - feat/postgres-persistence-adapter

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/postgres-persistence-adapter
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install authoritative server dependencies
        working-directory: packages/authoritative-server
        run: npm ci

      - name: Format PostgreSQL implementation
        working-directory: packages/authoritative-server
        run: npx prettier --write package.json src/persistence/postgres src/index.ts tests/postgresPersistence.test.ts

      - name: Remove temporary workflow and commit formatting
        run: |
          rm .github/workflows/format-postgres-adapter.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/authoritative-server .github/workflows/format-postgres-adapter.yml
          git commit -m "style: format PostgreSQL persistence adapter"
          git push origin HEAD:feat/postgres-persistence-adapter
