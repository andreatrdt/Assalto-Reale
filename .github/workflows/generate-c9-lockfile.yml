name: Generate C9 web lockfile

on:
  push:
    branches:
      - feat/invite-multiplayer-client

permissions:
  contents: write

jobs:
  lockfile:
    if: ${{ !contains(github.event.head_commit.message, 'lock multiplayer client dependency') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/invite-multiplayer-client

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update package lock
        working-directory: web
        run: npm install --package-lock-only --ignore-scripts

      - name: Commit lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/package-lock.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: lock multiplayer client dependency"
          git push origin HEAD:feat/invite-multiplayer-client
