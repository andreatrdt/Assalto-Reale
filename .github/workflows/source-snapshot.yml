name: Apply Game Core Patch

on:
  push:
    branches:
      - refactor/extract-game-core

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/extract-game-core
          fetch-depth: 0

      - name: Reconstruct and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .github/game-core-patch/part-00.txt \
            .github/game-core-patch/part-01.txt \
            .github/game-core-patch/tail-*.txt \
            > "$RUNNER_TEMP/game-core.patch.gz.b64"
          echo "7fd9ea3cd3be78075dc56afdff980023d7e5d51298c3b32104705fe2c9ed4b38  $RUNNER_TEMP/game-core.patch.gz.b64" | sha256sum --check
          base64 --decode "$RUNNER_TEMP/game-core.patch.gz.b64" > "$RUNNER_TEMP/game-core.patch.gz"
          echo "c2cc97ae3f0aeb179076570e5d5a8225c9c97bf2209aebc2602af0d5e0425274  $RUNNER_TEMP/game-core.patch.gz" | sha256sum --check
          gzip -dc "$RUNNER_TEMP/game-core.patch.gz" > "$RUNNER_TEMP/game-core.patch"
          echo "336d63672512e4bf79e38e619535f41294560b436b8ea7b12cb5ac130cff43f7  $RUNNER_TEMP/game-core.patch" | sha256sum --check

      - name: Apply extraction
        shell: bash
        run: |
          set -euo pipefail
          git apply --exclude=.github/workflows/source-snapshot.yml "$RUNNER_TEMP/game-core.patch"
          rm -rf .github/game-core-patch
          rm -f .github/workflows/source-snapshot.yml

      - name: Commit extraction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: establish pure game-core package"
          git push origin HEAD:refactor/extract-game-core
