name: Sync Authoritative Server Lockfile

on:
  push:
    branches:
      - feat/postgres-persistence-adapter

permissions:
  contents: write

jobs:
  sync-lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/postgres-persistence-adapter
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Refresh package lock
        working-directory: packages/authoritative-server
        run: npm install --package-lock-only --ignore-scripts

      - name: Remove temporary workflow and commit lockfile
        run: |
          rm .github/workflows/sync-authoritative-server-lock.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/authoritative-server/package-lock.json .github/workflows/sync-authoritative-server-lock.yml
          git commit -m "build: lock PostgreSQL driver dependencies"
          git push origin HEAD:feat/postgres-persistence-adapter
