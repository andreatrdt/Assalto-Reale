name: Format Debug

on:
  pull_request:

jobs:
  prettier-output:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Apply repository-locked Prettier
        working-directory: web
        run: |
          npx prettier --write \
            src/game/clocks/clockController.ts \
            src/game/history/historyController.ts \
            src/game/persistence/saveGame.ts \
            src/game/placement/placementSetup.ts \
            src/game/state/gameStore.ts \
            src/game/state/storeTypes.ts \
            src/game/turn/commitAction.ts \
            src/game/turn/turnHelpers.ts
      - name: Upload formatted modules
        uses: actions/upload-artifact@v4
        with:
          name: prettier-output
          path: |
            web/src/game/clocks/clockController.ts
            web/src/game/history/historyController.ts
            web/src/game/persistence/saveGame.ts
            web/src/game/placement/placementSetup.ts
            web/src/game/state/gameStore.ts
            web/src/game/state/storeTypes.ts
            web/src/game/turn/commitAction.ts
            web/src/game/turn/turnHelpers.ts
          if-no-files-found: error
