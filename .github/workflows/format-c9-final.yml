name: Format final C9 sources

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: ${{ github.event.pull_request.head.ref == 'feat/c9-invite-multiplayer' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/c9-invite-multiplayer
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install formatters
        run: |
          npm ci --prefix web
          npm ci --prefix packages/server-transport
      - name: Format client and transport changes
        run: |
          cd web
          npx prettier --write src/online src/pages/OnlinePage.tsx src/pages/HomePage.tsx src/app/AppRouter.tsx src/app/routes.ts src/styles/online.css src/styles/onlineGameHud.css tests/e2e/online.spec.ts
          cd ../packages/server-transport
          npx prettier --write src/guestSessions.ts src/transportServer.ts src/index.ts tests/guestSessions.test.ts tests/guestEndpoint.test.ts
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/src web/tests/e2e/online.spec.ts packages/server-transport/src packages/server-transport/tests
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "style: format final invite multiplayer sources"
          git push origin HEAD:feat/c9-invite-multiplayer
