name: Authoritative Server CI

on:
  pull_request:
  push:
    branches:
      - main
      - release/**

jobs:
  authoritative-server:
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: postgresql://assalto:assalto@127.0.0.1:5432/assalto_reale_test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: assalto
          POSTGRES_PASSWORD: assalto
          POSTGRES_DB: assalto_reale_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U assalto -d assalto_reale_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            packages/authoritative-server/package-lock.json

      - name: Install repository toolchain
        working-directory: web
        run: npm ci

      - name: Install authoritative server dependencies
        working-directory: packages/authoritative-server
        run: npm ci

      - name: Typecheck
        working-directory: packages/authoritative-server
        run: npm run typecheck

      - name: Architecture lint
        working-directory: packages/authoritative-server
        run: npm run lint

      - name: Formatting check
        working-directory: packages/authoritative-server
        run: npm run format:check

      - name: Unit and PostgreSQL integration coverage
        working-directory: packages/authoritative-server
        run: npm run test:coverage

      - name: ESM build and plain-Node smoke
        working-directory: packages/authoritative-server
        run: npm run smoke

      - name: Production dependency audit
        working-directory: packages/authoritative-server
        run: npm run audit:prod

  server-transport:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            packages/authoritative-server/package-lock.json
            packages/server-transport/package-lock.json

      - name: Install repository toolchain
        working-directory: web
        run: npm ci

      - name: Install authoritative server dependencies
        working-directory: packages/authoritative-server
        run: npm ci

      - name: Install transport dependencies
        working-directory: packages/server-transport
        run: npm ci

      - name: Typecheck
        working-directory: packages/server-transport
        run: npm run typecheck

      - name: Architecture lint
        working-directory: packages/server-transport
        run: npm run lint

      - name: Formatting check
        working-directory: packages/server-transport
        run: npm run format:check

      - name: HTTP and WebSocket integration coverage
        working-directory: packages/server-transport
        run: npm run test:coverage

      - name: ESM build and plain-Node smoke
        working-directory: packages/server-transport
        run: npm run smoke

      - name: Production dependency audit
        working-directory: packages/server-transport
        run: npm run audit:prod

  server-runtime:
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: postgresql://assalto:assalto@127.0.0.1:5432/assalto_reale_test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: assalto
          POSTGRES_PASSWORD: assalto
          POSTGRES_DB: assalto_reale_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U assalto -d assalto_reale_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            packages/multiplayer-protocol/package-lock.json
            packages/authoritative-server/package-lock.json
            packages/server-transport/package-lock.json
            packages/server-runtime/package-lock.json

      - name: Install repository toolchain
        working-directory: web
        run: npm ci

      - name: Install upstream package toolchains
        run: |
          npm --prefix packages/multiplayer-protocol ci
          npm --prefix packages/authoritative-server ci
          npm --prefix packages/server-transport ci

      - name: Install runtime dependencies
        working-directory: packages/server-runtime
        run: npm ci

      - name: Typecheck
        working-directory: packages/server-runtime
        run: npm run typecheck

      - name: Architecture lint
        working-directory: packages/server-runtime
        run: npm run lint

      - name: Formatting check
        working-directory: packages/server-runtime
        run: npm run format:check

      - name: Unit and composed-stack coverage (with PostgreSQL)
        working-directory: packages/server-runtime
        run: npm run test:coverage

      - name: ESM build and plain-Node smoke
        working-directory: packages/server-runtime
        run: npm run smoke

      - name: Production dependency audit
        working-directory: packages/server-runtime
        run: npm run audit:prod

      - name: Docker image build
        run: docker build -f packages/server-runtime/Dockerfile -t assalto-multiplayer:ci .
