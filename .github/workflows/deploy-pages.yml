name: Deploy web to GitHub Pages

# Publishes the modern React/Vite client (web/) to GitHub Pages from the
# authoritative source repository.
#
# Triggers:
#   - Automatically after the "CI" workflow succeeds on main (deploys the exact
#     tested commit).
#   - Manually via workflow_dispatch (accepts a base path), e.g. to redeploy or
#     to publish a different project-site subpath.
#
# One-time repository setting: Settings -> Pages -> Source = "GitHub Actions".

on:
  workflow_dispatch:
    inputs:
      base_path:
        description: "Vite base path — must match the Pages URL subpath."
        required: true
        default: "/Assalto-Reale/"
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deployments at once; let an in-progress publish finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Deploy on manual dispatch, or only when CI succeeded on main.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    env:
      # The exact commit tested by CI (workflow_run) or the dispatched ref.
      SOURCE_COMMIT: ${{ github.event.workflow_run.head_sha || github.sha }}
      BASE_PATH: ${{ github.event.inputs.base_path || '/Assalto-Reale/' }}
      VITE_MULTIPLAYER_WS_URL: wss://assalto-reale-production.up.railway.app/ws
    outputs:
      source_commit: ${{ steps.resolve.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the tested commit, not an unrelated later main commit.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Resolve tested source commit
        id: resolve
        run: echo "sha=$SOURCE_COMMIT" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Web unit tests (guard for manual dispatch)
        working-directory: web
        run: npm run test
      - name: Production build (with Pages base path)
        working-directory: web
        run: npm run build -- --base "$BASE_PATH"
      - name: Write release metadata (records tested commit)
        working-directory: web
        run: node scripts/write-release-metadata.mjs
      - name: Verify build output
        working-directory: web
        run: |
          set -euo pipefail
          for f in index.html 404.html manifest.webmanifest sw.js release-metadata.json; do
            test -f "dist/$f" || { echo "Missing dist/$f"; exit 1; }
          done
          grep -q "\"commit\": \"$SOURCE_COMMIT\"" dist/release-metadata.json
          grep -q "${BASE_PATH}assets/" dist/index.html
          echo "Build output verified for commit $SOURCE_COMMIT (base $BASE_PATH)."
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Verify live deployment
        env:
          URL: ${{ needs.deploy.outputs.page_url }}
          EXPECTED: ${{ needs.build.outputs.source_commit }}
        run: |
          set -uo pipefail
          origin=$(echo "$URL" | grep -oE '^https?://[^/]+')
          echo "Verifying $URL (expected commit $EXPECTED)"

          # GitHub Pages publication is not instantaneous: bounded retries, no long sleeps.
          ok=""
          meta=""
          for i in $(seq 1 20); do
            code=$(curl -fsS -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
            meta=$(curl -fsS "${URL}release-metadata.json" 2>/dev/null || echo "")
            if [ "$code" = "200" ] && printf '%s' "$meta" | grep -q "\"commit\": \"$EXPECTED\""; then
              ok=1; echo "attempt $i: live and commit matches"; break
            fi
            echo "attempt $i: root=$code, commit-match=no"
            sleep 9
          done
          if [ -z "$ok" ]; then
            echo "::error::Deployment did not go live with commit $EXPECTED"
            echo "last metadata: $meta"
            exit 1
          fi

          index=$(curl -fsS "$URL")
          if printf '%s' "$index" | grep -Eq 'AssaltoReale\.apk|pythons\.js'; then
            echo "::error::Legacy Pygbag loader is being served"
            exit 1
          fi

          assets=$(printf '%s' "$index" | grep -oE '/[^"]*assets/[^"]+\.(js|css)' | sort -u)
          [ -n "$assets" ] || { echo "::error::No JS/CSS assets referenced in index.html"; exit 1; }
          for a in $assets; do
            acode=$(curl -fsS -o /dev/null -w "%{http_code}" "${origin}${a}" 2>/dev/null || echo "000")
            echo "asset ${a} -> ${acode}"
            [ "$acode" = "200" ] || { echo "::error::Asset not reachable: ${a}"; exit 1; }
          done
          echo "Live deployment verified for commit $EXPECTED."
