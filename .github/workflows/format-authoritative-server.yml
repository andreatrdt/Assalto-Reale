name: Format Authoritative Server

on:
  push:
    branches:
      - feat/authoritative-server-foundation

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/authoritative-server-foundation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install server development dependencies
        working-directory: packages/authoritative-server
        run: npm install
      - name: Format server package
        working-directory: packages/authoritative-server
        run: npx prettier --write .
      - name: Remove temporary formatter and commit
        run: |
          rm -f .github/workflows/format-authoritative-server.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: format authoritative server package"
          git push origin HEAD:feat/authoritative-server-foundation
